name: ALLOCCULT Instagram Post

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies & fonts
        run: |
          pip install pillow -q
          mkdir -p fonts
          curl -sL -o "fonts/Cinzel.ttf" "https://raw.githubusercontent.com/google/fonts/main/ofl/cinzel/Cinzel%5Bwght%5D.ttf"
          curl -sL -o "fonts/EBGaramond.ttf" "https://raw.githubusercontent.com/google/fonts/main/ofl/ebgaramond/EBGaramond%5Bwght%5D.ttf"

      - name: Publish post
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post.py

      - name: Save posting history
        run: |
          git config user.name "alloccult-bot"
          git config user.email "bot@alloccult.com"
          git pull --rebase || true
          git add state.json
          git diff --cached --quiet || git commit -m "Update posting state"
          git push
