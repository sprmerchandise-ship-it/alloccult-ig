name: ALLOCCULT Instagram Post

on:
  schedule:
    # 18:00 UTC daily — edit this cron to change posting time/frequency.
    # e.g. "0 18 * * 1,3,5" = Mon/Wed/Fri only
    - cron: "0 18 * * *"
  workflow_dispatch: {}   # lets you trigger a post manually from the Actions tab

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish post
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post.py

      - name: Save posting history
        run: |
          git config user.name "alloccult-bot"
          git config user.email "bot@alloccult.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update posting state"
          git push
